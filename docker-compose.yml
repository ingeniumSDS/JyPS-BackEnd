services:
  jyps-api:
    build: .
    container_name: jyps_backend
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - DB_URL=${DOCKER_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DRIVER_CLASS_NAME=${DB_DRIVER_CLASS_NAME}

      - JPA_SHOW_SQL=${JPA_SHOW_SQL}
      - JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}

      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}

      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
