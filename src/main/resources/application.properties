spring.application.name=JyPS

# Configurar explĒcitamente el dialecto de Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Spring Datasource Configuration (CAMBIA LA RUTA DEL TNS_ADMIN A UNA RUTA ABSOLUTA)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Mostrar el SQL en consola (muy ·til para debuggear)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
